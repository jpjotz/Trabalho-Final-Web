<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vira-Página</title>
    <link rel="shortcut icon" href="image/logosite.png" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <nav class="nav-header">
            <figure class="logo-img">
                <a href="index.html">
                    <img class='logo' src="image/logosite.png" alt="Logo Site">
                </a>
            </figure>

            <section class="nav-buttons">
                <div class="loginButton">
                    <i id="icon-person" class="fa-regular fa-user"></i>
                    <button class="login">Entrar</button>
                </div>
                <button class="menu" onclick="modalHandler()">☰</button>
            </section>

        </nav>

        <div class="search-bar">
            <i id="search-icon" class="fa-solid fa-magnifying-glass"></i>
            <input id="search" type="text" placeholder="Digite livro ou autor a ser pesquisado">
        </div>

    </header>

    <div class="separador">
        <nav class="navegation-buttons">
            <a href="index.html">Home</a>
            <a href="">Contato</a>
            <a href="">Cálculo de Livros</a>
            <a href="">Como funciona</a>
            <a href="">Sobre</a>
        </nav>
    </div>

    <section class="info">
        <div class="texto-info">
            <p>
                Conecte-se com leitores e leitoras. Compartilhe histórias e versos.
            </p>
            
            <p>
                Troque páginas! O que não pode é deixar o livro guardado sem contar sua história.
            </p>
        </div>

        <figure>
            <img class="person-image" src="image/man-character-reading-book-free-png.webp" alt="">
        </figure>
    </section>

    <section class="livros-destaque">
        <p class="title-destaque">Livros em Destaque</p>

        <div class="capa-livros">
            <figure>
                <img src="image/percy_jackson.png" alt="">
            </figure>

            <figure>
                <img src="image/jogos_vorazes_01.png" alt="">
            </figure>

            <figure>
                <img src="image/apocalipse_livro.png" alt="">
            </figure>
        </div>
    </section>

    <section class="categoria">
        <h2 class="generos-title">Gêneros Literários</h2>


            
    </section>

    <script>
        function modalHandler() {
            const modal = document.querySelector(".separador");
            modal.classList.toggle("show");
        }

    </script>
</body>

</html>
